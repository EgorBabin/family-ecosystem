<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Единая точка входа для сервисов family ecosystem"
    />
    <title>ID</title>
    <link rel="stylesheet" href="/styles.css" />
    <script defer src="/app.js"></script>
  </head>
  <body>
    <main class="shell">
      <section class="card" aria-labelledby="title">
        <p class="eyebrow">family ecosystem / id</p>
        <h1 id="title">Единый вход</h1>
        <p id="subtitle" class="subtitle">
          Авторизация вынесена в отдельный защищённый сервис.
        </p>

        <label class="remember">
          <input id="remember" type="checkbox" />
          <span>Запомнить вход на 30 дней</span>
        </label>

        <div class="actions">
          <div id="telegram-slot" class="action telegram">
            <span id="telegram-placeholder">Telegram</span>
          </div>
          <a id="yandex-link" class="action yandex" href="/api/yandex"
            >Yandex</a
          >
        </div>

        <p id="status" class="status" role="status" aria-live="polite"></p>

        <div class="notes">
          <p>
            После входа сервис создаст одноразовый билет и передаст его только
            целевому поддомену.
          </p>
          <p>
            Билет короткоживущий и после первого использования становится
            недействительным.
          </p>
        </div>
      </section>
    </main>
  </body>
</html>
