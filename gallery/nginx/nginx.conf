user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    '"$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    server_tokens off;

    client_max_body_size 50M;
    client_body_timeout 12s;
    client_header_timeout 12s;

    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 90s;
    proxy_buffer_size   16k;
    proxy_buffers       4 32k;
    proxy_busy_buffers_size 64k;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_buffers 16 8k;
    gzip_types
        application/javascript
        application/json
        application/ld+json
        application/xml
        text/css
        text/html
        text/plain
        text/xml
        image/svg+xml;
    gzip_min_length 256;

    limit_req_zone $binary_remote_addr zone=req_zone:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=addr_zone:10m;

    # Traefik / docker-network
    set_real_ip_from 172.18.0.0/16;
    set_real_ip_from 127.0.0.1;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header X-XSS-Protection "1; mode=block" always;
    # add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data:; style-src 'self' 'unsafe-inline';" always;

    server {
        listen 80;
        server_name _;

        limit_conn addr_zone 10;                    # максимум 10 одновременных соединений от одного IP
        limit_req zone=req_zone burst=20 nodelay;   # burst=20 для кратковременных всплесков

        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
        }

        location ^~ /api/ {
            # Защита: запрет на не-GET/POST/PUT/DELETE/OPTIONS если нужно
            if ($request_method !~ ^(GET|POST|PUT|DELETE|OPTIONS)$ ) {
                return 405;
            }

            limit_conn addr_zone 10;
            limit_req zone=req_zone burst=20 nodelay;

            proxy_pass http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Доп. опции для стабильности
            proxy_buffering on;
            proxy_buffers 8 16k;
            proxy_busy_buffers_size 64k;
            proxy_cache_bypass $http_cache_control;
        }
    }
}
